name: Deployment Status
on:
  push:
    branches: [ main ]

jobs:
  pre-deployment:
    runs-on: ubuntu-latest
    outputs:
      issue_number: ${{ steps.create_issue.outputs.result }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

      - name: Run tests
        run: npm run test

      - name: Install jq
        run: sudo apt-get install -y jq

      - name: Get previous commit SHA
        id: prev_commit
        run: echo "sha=$(git rev-parse HEAD~1)" >> $GITHUB_OUTPUT

      - name: Get package version
        id: package_version
        run: echo "version=$(jq -r '.version' package.json)" >> $GITHUB_OUTPUT

      - name: Create deployment tracking issue
        id: create_issue
        uses: actions/github-script@v7
        with:
          script: |
            const { data: issue } = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Deployment Tracking - ${context.sha}`,
              labels: ['deployment', 'in-progress'],
              body: `Deployment tracking issue for commit ${context.sha}`
            });
            return issue.number;

      - name: Post pre-deployment comment
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ steps.create_issue.outputs.result }},
              body: "Pre-deployment checks completed"
            });

  rollback-preparation:
    runs-on: ubuntu-latest
    needs: pre-deployment
    outputs:
      sha256: ${{ steps.create_rollback_package.outputs.sha256 }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install jq
        run: sudo apt-get install -y jq

      - name: Get previous commit SHA
        id: prev_commit
        run: echo "sha=$(git rev-parse HEAD~1)" >> $GITHUB_OUTPUT

      - name: Get package version
        id: package_version
        run: echo "version=$(jq -r '.version' package.json)" >> $GITHUB_OUTPUT

      - name: Create rollback script
        run: |
          cat > rollback.sh << 'EOF'
          #!/bin/bash
          set -euo pipefail

          echo "Starting rollback to commit $PREV_COMMIT"

          # Check if git is available
          if ! command -v git &> /dev/null; then
            echo "Error: git is not installed"
            exit 1
          fi

          # Checkout previous commit
          git checkout $PREV_COMMIT

          # Install dependencies
          npm ci

          # Verify dependencies
          npm run verify-dependencies

          echo "Rollback completed successfully"
          EOF
          chmod +x rollback.sh

      - name: Create dependency verification script
        run: |
          cat > verify-dependencies.sh << 'EOF'
          #!/bin/bash
          set -euo pipefail

          echo "Verifying dependencies..."

          # Check package-lock.json integrity
          npm ci --dry-run

          # Check for missing dependencies
          npm ls --depth=0

          echo "Dependencies verified successfully"
          EOF
          chmod +x verify-dependencies.sh

      - name: Create rollback documentation
        run: |
          cat > ROLLBACK_GUIDE.md << 'EOF'
          # Rollback Guide for Deployment ${COMMIT_SHA}

          ## Overview
          This guide provides step-by-step instructions to rollback to the previous commit (${PREV_COMMIT}).

          ## Prerequisites
          - Git installed
          - Node.js ${NODE_VERSION} installed
          - npm installed

          ## Rollback Steps
          1. Stop the application
          2. Run the rollback script: `./rollback.sh`
          3. Verify the application is running correctly
          4. Check logs for any errors

          ## Quick Rollback Command
          ```bash
          ./rollback.sh
          ```
          EOF

      - name: Create configuration backups
        run: |
          mkdir -p rollback-backups
          cp package.json rollback-backups/
          cp package-lock.json rollback-backups/
          # Add environment templates if they exist
          if [ -f .env.example ]; then
            cp .env.example rollback-backups/
          fi

      - name: Create rollback package
        id: create_rollback_package
        run: |
          ARTIFACT_NAME="rollback-package-${{ github.sha }}"
          tar -czf "${ARTIFACT_NAME}.tar.gz" rollback.sh verify-dependencies.sh ROLLBACK_GUIDE.md rollback-backups/
          echo "artifact_name=${ARTIFACT_NAME}" >> $GITHUB_OUTPUT
          # Generate SHA256 checksum
          SHA256=$(sha256sum "${ARTIFACT_NAME}.tar.gz" | awk '{print $1}')
          echo "sha256=${SHA256}" >> $GITHUB_OUTPUT

      - name: Upload rollback artifact
        uses: actions/upload-artifact@v4
        with:
          name: rollback-package-${{ github.sha }}
          path: rollback-package-${{ github.sha }}.tar.gz
          retention-days: 30

      - name: Post rollback plan comment
        uses: actions/github-script@v7
        with:
          script: |
            const issueNumber = ${{ needs.pre-deployment.outputs.issue_number }};
            const prevCommit = "${{ steps.prev_commit.outputs.sha }}";
            const currentCommit = "${{ github.sha }}";
            const packageVersion = "${{ steps.package_version.outputs.version }}";
            const artifactName = "${{ steps.create_rollback_package.outputs.artifact_name }}";
            const sha256 = "${{ steps.create_rollback_package.outputs.sha256 }}";

            const commentBody = `
            # 🔄 Rollback Plan Ready

            Previous Commit: ${prevCommit}
            Current Commit: ${currentCommit}
            Package Version: ${packageVersion}
            Artifact: ${artifactName}

            ✅ Rollback script created
            ✅ Configuration backup completed
            ✅ Dependency verification script created
            ✅ Rollback documentation generated
            ✅ Compressed rollback package created

            ## Quick Rollback Command
            \`\`\`bash
            ./rollback.sh
            \`\`\`

            Rollback script created: true
            Configuration backup: true
            SHA256: ${sha256}
            `;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              body: commentBody
            });

  post-deployment:
    runs-on: ubuntu-latest
    needs: rollback-preparation
    steps:
      - name: Get issue number from pre-deployment
        id: get_issue_number
        run: echo "issue_number=${{ needs.pre-deployment.outputs.issue_number }}" >> $GITHUB_OUTPUT

      - name: Update issue labels
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.removeLabel({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ steps.get_issue_number.outputs.issue_number }},
              name: 'in-progress'
            });

            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ steps.get_issue_number.outputs.issue_number }},
              labels: ['completed']
            });

      - name: Post final comment
        uses: actions/github-script@v7
        with:
          script: |
            const issueNumber = ${{ steps.get_issue_number.outputs.issue_number }};
            const artifactName = "rollback-package-${{ github.sha }}";
            const sha256 = "${{ needs.rollback-preparation.outputs.sha256 }}";

            const commentBody = `
            Deployment Completed Successfully

            Rollback artifact details:
            - Artifact name: ${artifactName}
            - Retention period: 30 days
            - SHA256 checksum: ${sha256}
            `;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              body: commentBody
            });

      - name: Close deployment issue
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ steps.get_issue_number.outputs.issue_number }},
              state: 'closed'
            });
